name: Build iOS App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set iOS Deployment Target & Swift Version
        run: |
          sed -i '' "s/platform :ios, '[0-9]*\.[0-9]*/platform :ios, '16.0/g" ios/App/Podfile

          if ! grep -q "post_install" ios/App/Podfile; then
            cat >> ios/App/Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
                config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
              end
            end
          end
          EOF
          fi

          cd ios/App && pod install --repo-update

      - name: Build iOS App (Archive)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     DEVELOPMENT_TEAM="" \
                     IPHONEOS_DEPLOYMENT_TARGET=16.0 \
                     ONLY_ACTIVE_ARCH=NO \
                     SWIFT_VERSION=5.0 \
                     SWIFT_OPTIMIZATION_LEVEL=-Onone \
                     GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
                     | xcpretty || exit 1

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: build/App.xcarchive
